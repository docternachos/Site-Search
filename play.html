<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Site Player
</title>

<link
    rel="stylesheet"
    href="style.css"
/>

</head>

<body class="player-page">

<div class="player-topbar">

    <a
        href="index.html"
        class="back-btn"
    >
        ← Home
    </a>

    <button
        id="fullscreenBtn"
    >
        Fullscreen
    </button>

    <a
        id="openSiteBtn"
        target="_blank"
    >
        Open Directly
    </a>

</div>

<div
    id="blockedMessage"
    class="blocked-message hidden"
>

    <h1>
        This site cannot be embedded
    </h1>

    <p>
        Open it directly instead.
    </p>

</div>

<iframe
    id="siteFrame"
    allowfullscreen
></iframe>

<script
    src="play.js"
></script>

</body>
</html>
