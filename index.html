<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Site Search</title>

<link
    rel="stylesheet"
    href="style.css"
/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg-glow"></div>

<header class="topbar">

    <div class="logo">

        <div class="logo-icon">
            ◆
        </div>

        <h1>
            Site Search
        </h1>

    </div>

    <a
        href="admin.html"
        class="admin-btn"
    >
        Admin
    </a>

</header>

<!-- ANNOUNCEMENT -->
<div
    id="announcementBar"
    class="announcement hidden"
></div>

<!-- HERO -->
<section class="hero">

    <h1>
        Discover Websites
    </h1>

    <p>
        Search and launch websites instantly.
    </p>

    <input
        id="searchInput"
        type="text"
        placeholder="Search websites..."
    >

</section>

<!-- CATEGORY FILTERS -->
<div class="categories">

    <button
        class="category-btn active"
        data-category="all"
    >
        All
    </button>

    <button
        class="category-btn"
        data-category="Games"
    >
        Games
    </button>

    <button
        class="category-btn"
        data-category="Tools"
    >
        Tools
    </button>

    <button
        class="category-btn"
        data-category="School"
    >
        School
    </button>

    <button
        class="category-btn"
        data-category="Entertainment"
    >
        Entertainment
    </button>

</div>

<!-- FEATURED -->
<section class="section">

    <div class="section-header">

        <h2>
            ⭐ Featured
        </h2>

    </div>

    <div
        id="featuredGrid"
        class="sites-grid"
    ></div>

</section>

<!-- RECENT -->
<section class="section">

    <div class="section-header">

        <h2>
            🕒 Recently Added
        </h2>

    </div>

    <div
        id="recentGrid"
        class="sites-grid"
    ></div>

</section>

<!-- ALL -->
<section class="section">

    <div class="section-header">

        <h2>
            🌐 All Sites
        </h2>

    </div>

    <div
        id="sitesGrid"
        class="sites-grid"
    ></div>

</section>

<script
    type="module"
    src="app.js"
></script>

</body>
</html>
